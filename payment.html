<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style1.css">
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Thala.7|Payment</title>
</head>
<body>
    <div class="container1">
       
          <div class="left">
                <p>Checkout</p>
         
            <div class="contact-det">
            <h3>Contact Details</h3>
            <label for="email">Email ID:</label><br>
            <input type="email" name="email" id="email" placeholder="abcd@gmail.com">

            <div class="payment">
                <h3>Payment</h3>
                <div class="pay-box">
                    <div class="bank-options">
                        <div class="option-box">
                            <i class="fa fa-credit-card"></i>
                            <p>Card</p>
                        </div>
                        <div class="option-box">
                           <i class="fa fa-bitcoin-sign"></i>
                            <p>Crypto</p>
                        </div>
                        <div class="option-box">
                            <i class="fa fa-bank"></i>
                            <p>Bank</p>
                        </div>
                        <div class="option-box">
                            <i class="fa fa-mobile"></i>
                            <p>UPI</p>
                        </div>
                    </div>
                    <div class="card-details">
                        <label for="cardno">Card Number:</label>
                        <input type="text" name="cardno" placeholder="123456XXXX">

                        <div class="row">
                            <label for="Expiry">Expiry:</label>
                            <input type="text" name="Expity" placeholder="MM/YY">

                            <label for="cvc">CVC:</label>
                            <input type="text" name="cvc" placeholder="xxxxxx">
                        </div>

                        <div class="row">
                            <label for="Country">Country:</label>
                            <input type="text" name="Country" placeholder="Eg. India">

                            <label for="zip">ZIP:</label>
                            <input type="text" name="zip" placeholder=".......">
                        </div>
                    </div>

                    
                </div>
            </div>
            
        </div>
        
    </div>
          <div class="summary">
            <h3>Order Summary</h3>
      <p>Enter Coupon Code</p>
      <input type="text" placeholder="COUPON CODE">
    <button>Apply Coupon</button>
    
    

    <div class="price-box">
      <p>Sub Total <span>₹4,700</span></p>
      <p>Tax <span>₹299</span></p>
      <p>Discount <span>₹0</span></p>
      <h3>Total <span>₹4,999</span></h3>
    </div>

    <div class="pay">

    <button class="pay-btn">Pay Now ₹4,999</button>

    <div class="pay-img">
      <img src="./images/secpay.png" alt="rozorpay" width="60%">
      <img src="./images/rozorpay.svg" alt="rozorpay" width="60%">
      <img src="./images/anpay.webp" alt="rozorpay" width="60%">

    </div>
    </div>
  </div>

</div>

    </div>
</body>
</html>
