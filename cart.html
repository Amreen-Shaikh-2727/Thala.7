<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thala.7 | Cart</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="header2">

    
    <div class="container">
        <div class="navbar">
            <input type="checkbox" id="menu-toggle">
        <div class="logo">
            <a href="index.html"><img src="images/thala_logo1.png" alt="logo" width="125px"></a>
        </div>
        <nav>
            <ul>
                
                <li><a href="#products">Products</a></li>
                <li><a href="">Brands</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
                 <li class="mobile-profile">
            <a href=""><img src="images/product-10.jpg" class="profile-nav"></a>
                </li>
            </ul>
        </nav>
        <div class="nav-right">
            <input type="search" class="search" placeholder="Search">
            <img src="images/cart.png" alt="cart" class="icon"> 
            <img src="images/buy-2.jpg" alt="profile" class="profile">
            <label for="menu-toggle">
            <img src="images/menu.png" alt="cart" class="menu-icon">
            </label>
        </div>
    </div>

    <div class="container1">

  <!-- LEFT SIDE -->
  <div class="cart-items">
    <h2>Shopping Cart</h2>

    <div class="cart-header">
      <span>Product</span>
      <span>Quantity</span>
      <span>Price</span>
    </div>

    <div class="cart-item">
      <p>M.s Dhoni Women Shoe </p>

      <div class="qty">
        <button>-</button>
        <span>1</span>
        <button>+</button>
      </div>

      <p>₹4,999</p>
      <span class="delete">x</span>
    </div>

    <div class="cart-item">
      <p>M.s Dhoni Sports Blue Shoe</p>

      <div class="qty">
        <button>-</button>
        <span>1</span>
        <button>+</button>
      </div>

      <p>₹2,999</p>
      <span class="delete">x</span>
    </div>

    <div class="cart-item">
      <p>M.s Dhoni Hiking Shoes </p>

      <div class="qty">
        <button>-</button>
        <span>1</span>
        <button>+</button>
      </div>

      <p>₹4,99</p>
      <span class="delete">x</span>
    </div>


  </div>

  <!-- RIGHT SIDE -->
  <div class="summary">
    
      <p>Enter Coupon Code</p>
      <input type="text" placeholder="COUPON CODE">
    <button>Apply Coupon</button>
    
    

    <div class="price-box">
      <p>Sub Total <span>₹4,700</span></p>
      <p>Tax <span>₹299</span></p>
      <p>Discount <span>₹0</span></p>
      <h3>Total <span>₹4,999</span></h3>
    </div>

    <div class="pay">

    <button class="pay-btn">Pay Now ₹4,999</button>

    <div class="pay-img">
      <img src="./images/secpay.png" alt="rozorpay" width="60%">
      <img src="./images/rozorpay.svg" alt="rozorpay" width="60%">
      <img src="./images/anpay.webp" alt="rozorpay" width="60%">

    </div>
    </div>
  </div>

</div>

<div class="bottom-container">
  <a href="index.html"><p>&larr; Continue Shopping</p></a>
</div>
</body>
</html>
